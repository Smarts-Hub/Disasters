# Useful links:
# - https://discord.smartshub.dev -> support

# Available drivers: h2, mysql
# If you are using h2, you don't need to specify the host, port, db-name,
# username and password due to h2 is local database.
database:
  driver: h2
  host: 101.101.101.101
  port: 3306
  db-name: disasters
  username: userNaMeForDisasters
  password: passw0rD

# This is the location where players will return after the game ends
# (Used when bungee mode is disabled)
lobby:
  world: world
  x: 0
  y: 64
  z: 0
  yaw: 0
  pitch: 0

# BungeeCord/Velocity support
# When enabled, players are sent to a different backend server at game end
# instead of being teleported to the lobby location above.
bungee:
  enabled: false
  server: "lobby"

enable-scoreboard: true
# Voting system settings
voting:
# Enable/disable the PvP vs PvE vote during countdown
  enabled: true
  # Enable/disable the disaster multiplier vote (1x-5x)
  multiplier-enabled: true
  
show-active-disasters: false

# Damage dealt by the Hot Sun disaster every second (0.5 = 1/4 heart)
hot-sun-damage: 0.5

# DO NOT TOUCH THIS!
config-version: 1