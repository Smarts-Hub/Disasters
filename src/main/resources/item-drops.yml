# Item Drops Configuration
# Items will randomly spawn in arenas during disasters

# Enable or disable item drops globally
enabled: true

# Time in seconds between item drop spawns
drop-rate: 20

# Max number of players that get a drop each cycle
# If there are 20 players and this is 10, only 10 random players get a drop per cycle
max-players-per-cycle: 10

# Time in seconds before a dropped item despawns if not picked up
despawn-time: 30

# How far from a player items can spawn (in blocks)
spawn-radius: 15

# Make dropped items glow (enchant shimmer outline)
glow: true

# Rarity tiers - each tier has a % chance, a name color (MiniMessage), and a list of items
# The chances should add up to 100
# Format: MATERIAL_NAME or MATERIAL_NAME:AMOUNT or POTION:EFFECT or SPLASH_POTION:EFFECT
tiers:
  common:
    chance: 60
    color: "<white>"
    items:
      # -- Food --
      - COOKED_BEEF
      - MILK_BUCKET
      - POTION:FIRE_RESISTANCE
      #- COOKED_PORKCHOP
      #- COOKED_CHICKEN
      #- COOKED_MUTTON
      #- COOKED_SALMON
      #- COOKED_COD
